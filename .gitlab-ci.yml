include:
  - project: 'tomshley/brands/global/tware/tech/products/provisioning/cicd-pipelines'
    ref: 'v0.5.1'
    file:
      - '/adapters/gitlab/ci/adapter.yml'

variables:
  CICD_PIPELINES_RUNNER_TAG: "0.5.1"
  BASE_CONTAINERS_REGISTRY: registry.gitlab.com/tomshley/brands/global/tware/tech/products/provisioning/base-containers
  BASE_CONTAINERS_UPSTREAM_TAG: 0.4.3

# ── Kustomize Validation ─────────────────────────────────────────────────────

validate-kustomize:
  stage: build
  image: ${BASE_CONTAINERS_REGISTRY}/base-alpine-3_23-upstream:${BASE_CONTAINERS_UPSTREAM_TAG}
  tags:
    - saas-linux-small-amd64
  before_script:
    - apk add --no-cache curl
    # Install kustomize
    - |
      KUSTOMIZE_VERSION=v5.3.0
      curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin
      chmod +x /usr/local/bin/kustomize
      kustomize version
  script:
    - echo "=== Validating Kustomize Templates ==="
    - |
      set -e
      FAILED=0
      
      # Validate all workloads
      for dir in workloads/*/; do
        if [ -f "${dir}kustomization.yaml" ]; then
          echo "Validating ${dir}..."
          kustomize build "$dir" > /dev/null || FAILED=1
        fi
      done
      
      # Validate all components
      for dir in components/*/; do
        if [ -f "${dir}kustomization.yaml" ]; then
          echo "Validating ${dir}..."
          kustomize build "$dir" > /dev/null || FAILED=1
        fi
      done
      
      # Validate local-path examples (skip service-consumer which has remote URLs)
      for dir in examples/pekko-cluster-dns-bootstrap examples/pekko-cluster-kubernetes-api-bootstrap; do
        if [ -f "${dir}/kustomization.yaml" ]; then
          echo "Validating ${dir}..."
          kustomize build "$dir" > /dev/null || FAILED=1
        fi
      done
      
      if [ $FAILED -eq 1 ]; then
        echo "ERROR: One or more kustomize builds failed"
        exit 1
      fi
      
      echo "✓ All templates validated successfully"
  rules:
    - when: always

# ── Mirror Sync (disabled) ───────────────────────────────────────────────────

tomshley-cicd-mirror-sync:
  rules:
    - when: never
