apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Example: How a service repository consumes workload templates remotely
#
# Identity Model:
#   Labels define identity. Names are cosmetic.
#   Consumer sets `app` label via `labels` with `includeSelectors: true`.
#   Kustomize propagates labels to selectors, pod templates, PDBs, and Services.
#   `namePrefix` handles resource name uniqueness independently.
#
# This example shows:
# - Remote resource references with version pinning
# - Label-driven identity (app label = service identity)
# - Namespace assignment
# - Name prefixing for resource name uniqueness
# - Image substitution
# - Pekko-specific actorSystemName (separate from selectors)
#
# IMPORTANT: Always fetch kustomizeconfig.yaml to ensure cross-resource references
# (ServiceAccount, Service, Secret, Role) and topologySpreadConstraints labels
# are rewritten correctly.

namespace: my-platform

# Prefix all resource names to avoid collisions in shared namespaces
# Result: metadata.name becomes "egressapp", "egressapp-bootstrap", etc.
namePrefix: egress

# Fetch kustomizeconfig.yaml for safe name + label transformations
configurations:
  - https://gitlab.com/your-org/workload-templates-k8s//kustomizeconfig.yaml?ref=v0.1.0

# Remote template references (GitLab URL format)
# Pattern: gitlab.com/{org}/{repo}//{path}?ref={version}
resources:
  - https://gitlab.com/your-org/workload-templates-k8s//workloads/pekko-cluster?ref=v0.1.0
  - https://gitlab.com/your-org/workload-templates-k8s//components/serviceaccount?ref=v0.1.0
  - https://gitlab.com/your-org/workload-templates-k8s//components/pdb?ref=v0.1.0
  - https://gitlab.com/your-org/workload-templates-k8s//components/service-headless-pekko-bootstrap?ref=v0.1.0
  # Note: DNS bootstrap via headless service. For K8s API bootstrap, use rbac-pod-reader instead.

# Identity labels — `app` is the canonical selector/routing label
# Must be unique per deployment in the namespace to avoid cross-selection
labels:
  - pairs:
      app: egress
    includeSelectors: true

  # Pekko-specific: actorSystemName for cluster member discovery
  # Separate block keeps it out of Service/PDB selectors (no unnecessary coupling)
  # Non-Pekko consumers (deployment-http, stateful-service, cron-job) omit this block
  - pairs:
      actorSystemName: egress
    includeSelectors: false
    includeTemplates: true

# Replace placeholder image with actual service image
images:
  - name: PLACEHOLDER_IMAGE
    newName: registry.example.com/my-org/egress-server
    newTag: "1.0.0"

# Service-specific configuration patches would go in patches/ directory
# Example structure:
#
# patches:
#   - path: patches/deployment-env.yaml
#     target:
#       kind: Deployment
#       name: -app
#
# Where patches/deployment-env.yaml contains:
#
# - op: add
#   path: /spec/template/spec/containers/0/env/-
#   value:
#     name: DATABASE_URL
#     valueFrom:
#       secretKeyRef:
#         name: database-credentials
#         key: url
