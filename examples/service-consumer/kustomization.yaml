apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Example: How a service repository consumes workload templates remotely
#
# Service repos reference templates via GitLab/GitHub URLs instead of copying manifests.
# This example shows:
# - Remote resource references
# - Namespace assignment
# - Name prefixing to avoid collisions
# - Image substitution
# - commonLabels for observability
#
# IMPORTANT: When using namePrefix/nameSuffix with remote templates, also fetch
# the kustomizeconfig.yaml to ensure cross-resource references are rewritten correctly.
# See configurations section below.

namespace: my-platform

# Prefix all resource names to avoid collisions in shared namespaces
namePrefix: my-service-

# Fetch kustomizeconfig.yaml for safe name transformations
# Without this, namePrefix won't rewrite ServiceAccount references, Service references, etc.
configurations:
  - https://gitlab.com/your-org/workload-templates-k8s//kustomizeconfig.yaml?ref=v1.0.0

# Remote template references (GitLab URL format)
# Pattern: gitlab.com/{org}/{repo}//{path}?ref={version}
resources:
  - https://gitlab.com/your-org/workload-templates-k8s//workloads/pekko-cluster?ref=v1.0.0
  - https://gitlab.com/your-org/workload-templates-k8s//components/serviceaccount?ref=v1.0.0
  - https://gitlab.com/your-org/workload-templates-k8s//components/pdb?ref=v1.0.0
  - https://gitlab.com/your-org/workload-templates-k8s//components/service-headless-pekko-bootstrap?ref=v1.0.0
  # Note: DNS bootstrap via headless service. For K8s API bootstrap, use rbac-pod-reader instead.

# Standard labels for platform observability
labels:
  - pairs:
      app.kubernetes.io/name: my-service
      app.kubernetes.io/component: pekko-cluster
      app.kubernetes.io/part-of: my-platform
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true

# Replace placeholder image with actual service image
images:
  - name: PLACEHOLDER_IMAGE
    newName: registry.example.com/my-org/my-service
    newTag: "1.0.0"

# Service-specific configuration patches would go in patches/ directory
# Example structure:
#
# patches:
#   - path: patches/deployment-env.yaml
#     target:
#       kind: Deployment
#       name: PLACEHOLDER_APP_NAME
#
# Where patches/deployment-env.yaml contains:
#
# - op: add
#   path: /spec/template/spec/containers/0/env/-
#   value:
#     name: DATABASE_URL
#     valueFrom:
#       secretKeyRef:
#         name: database-credentials
#         key: url
