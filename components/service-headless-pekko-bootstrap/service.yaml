apiVersion: v1
kind: Service
metadata:
  name: -app-bootstrap
  labels:
    app: app
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: app
  ports:
    - name: remoting
      port: 7355
      targetPort: remoting
      protocol: TCP
    - name: management
      port: 7626
      targetPort: management
      protocol: TCP
