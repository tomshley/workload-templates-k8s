apiVersion: apps/v1
kind: Deployment
metadata:
  name: -app
  labels:
    app: app
    actorSystemName: app
spec:
  replicas: 3
  revisionHistoryLimit: 10  # Higher than standard (3) for cluster state rollback safety
  minReadySeconds: 15
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
        actorSystemName: app
    spec:
      serviceAccountName: -app
      terminationGracePeriodSeconds: 60
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: app
      # imagePullSecrets — add via patch if your registry requires auth
      # See README "Image Pull Secrets" section for .env-driven pattern
      containers:
        - name: app
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: remoting
              containerPort: 7355
              protocol: TCP
            - name: management
              containerPort: 7626
              protocol: TCP
          env:
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: APP_LABEL
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['app']
            - name: REQUIRED_CONTACT_POINT_NR
              value: "1"
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:InitialRAMPercentage=50 -XX:MaxRAMPercentage=70"
          startupProbe:
            httpGet:
              path: /ready
              port: management
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: management
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /alive
              port: management
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 30"]  # Pekko cluster graceful leave coordination
