apiVersion: apps/v1
kind: Deployment
metadata:
  name: -app
  labels:
    app: app
spec:
  replicas: 2
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: app
  template:
    metadata:
      labels:
        app: app
    spec:
      serviceAccountName: -app
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: app
      # imagePullSecrets — add via patch if your registry requires auth
      # See README "Image Pull Secrets" section for .env-driven pattern
      containers:
        - name: app
          image: PLACEHOLDER_IMAGE
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 5"]  # Shorter sleep for stateless HTTP (vs 10s for stateful workloads)
          # Runtime-neutral: no env vars by default. JVM consumers add JAVA_TOOL_OPTIONS
          # via a deployment-env patch in their overlay; Python/Go consumers add their own
          # runtime configuration. Pekko Cluster services should consume
          # `workloads/pekko-cluster` instead, which bundles JVM heap tuning, the
          # remoting + management ports, and cluster-leave lifecycle defaults.
          #
          # Probe paths follow the convention shared with `tomshley/boilerplate-jvm`:
          #   /alive  — liveness (process is alive); always-200 for a running pod
          #   /ready  — readiness (dependencies are ready); 200 only when the pod
          #             can accept traffic
          # Probes target the `http` port — single-port mode by default. Consumers
          # that expose a separate management/admin port can patch the probe target.
          startupProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /alive
              port: http
            periodSeconds: 10
            failureThreshold: 5
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              memory: "2Gi"
