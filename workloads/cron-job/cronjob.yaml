apiVersion: batch/v1
kind: CronJob
metadata:
  name: -app
  labels:
    app: app
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app: app
    spec:
      template:
        metadata:
          labels:
            app: app
        spec:
          serviceAccountName: -app
          restartPolicy: OnFailure
          # imagePullSecrets — add via patch if your registry requires auth
          # See README "Image Pull Secrets" section for .env-driven pattern
          containers:
            - name: app
              image: PLACEHOLDER_IMAGE
              imagePullPolicy: IfNotPresent
              # Runtime-neutral: no env vars by default. JVM consumers add
              # JAVA_TOOL_OPTIONS via a strategic-merge patch in their overlay;
              # Python/Go consumers add their own runtime configuration. See
              # README "Workload Selection" for the full runtime classification
              # of each workload.
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  memory: "2Gi"
