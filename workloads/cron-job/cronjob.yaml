apiVersion: batch/v1
kind: CronJob
metadata:
  name: app
  labels:
    app: app
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  jobTemplate:
    metadata:
      labels:
        app: app
    spec:
      template:
        metadata:
          labels:
            app: app
        spec:
          serviceAccountName: app
          restartPolicy: OnFailure
          # imagePullSecrets — add via patch if your registry requires auth
          # See README "Image Pull Secrets" section for .env-driven pattern
          containers:
            - name: app
              image: PLACEHOLDER_IMAGE
              imagePullPolicy: IfNotPresent
              env:
                - name: JAVA_TOOL_OPTIONS
                  value: "-XX:InitialRAMPercentage=50 -XX:MaxRAMPercentage=70"
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  memory: "2Gi"
